name: Build Hex (with punctuation)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve packages
        run: |
          xcodebuild \
            -project Hex.xcodeproj \
            -resolvePackageDependencies \
            -scmProvider system

      - name: Build Hex.app
        id: build
        continue-on-error: true
        run: |
          xcodebuild \
            -project Hex.xcodeproj \
            -scheme Hex \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Check build result
        if: steps.build.outcome == 'success'
        run: |
          cd build/Build/Products/Release
          zip -r Hex-punctuation.zip Hex.app

      - name: Upload app
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Hex-punctuation
          path: build/Build/Products/Release/Hex-punctuation.zip
